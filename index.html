<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build the Box with Cubes</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #f8fafc;
}

.header {
  background: white;
  padding: 16px 20px;
  border-bottom: 1px solid #e5e7eb;
}

.header h1 {
  margin: 0;
  color: #ec4899;
}

.layout {
  display: flex;
  height: calc(100vh - 70px);
}

.left-panel {
  width: 240px;
  background: white;
  border-right: 1px solid #e5e7eb;
  padding: 14px;
}

.main {
  flex: 1;
  padding: 16px;
  display: flex;
  flex-direction: column;
}

.canvas-wrap {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 10px;
}

.canvas-card {
  width: 700px;
  height: 500px;
  background: white;
  border-radius: 20px;
  border: 1px solid #e5e7eb;
}

#scene {
  width: 100%;
  height: 100%;
}

.button-row {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.primary {
  background: #8b5cf6;
  color: white;
}

.secondary {
  background: white;
  border: 1px solid #ccc;
}

/* ===== NEW 3D CUBE STYLES ===== */

.cube-option {
  border: 2px solid #e5e7eb;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 12px;
  text-align: center;
  cursor: pointer;
  background: #fafafa;
}

.cube-option.selected {
  border-color: #8b5cf6;
  background: #f5f3ff;
}

.cube-preview-wrap {
  height: 80px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.cube3d {
  position: relative;
}

.face {
  position: absolute;
}

.front {
  width: 70%;
  height: 70%;
  bottom: 0;
  left: 0;
}

.top {
  width: 70%;
  height: 35%;
  top: 0;
  left: 0;
  clip-path: polygon(0 50%, 50% 0, 100% 50%, 50% 100%);
}

.side {
  width: 35%;
  height: 70%;
  right: 0;
  bottom: 0;
  clip-path: polygon(0 25%, 100% 0, 100% 75%, 0 100%);
}

</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>

<body>

<div class="header">
  <h1>Build the Box with Cubes!</h1>
</div>

<div class="layout">

  <!-- LEFT -->
  <div class="left-panel" id="cubeOptions"></div>

  <!-- CENTER -->
  <div class="main">
    <div class="canvas-wrap">
      <div class="canvas-card">
        <canvas id="scene"></canvas>
      </div>
    </div>

    <div class="button-row">
      <button class="primary" id="addCube">+ Add Cube</button>
      <button class="secondary" id="undo">Undo</button>
      <button class="secondary" id="reset">Reset</button>
    </div>
  </div>

</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const cubeOptionsEl = document.getElementById('cubeOptions');

const CUBE_SIZES = [1,2,3];
let selectedCube = 2;

/* ===== NEW RENDER FUNCTION ===== */
function renderCubeOptions() {
  cubeOptionsEl.innerHTML = '';

  const styles = {
    1: { size:50, front:'#3b82f6', top:'#60a5fa', side:'#2563eb' },
    2: { size:65, front:'#22c55e', top:'#4ade80', side:'#16a34a' },
    3: { size:80, front:'#f97316', top:'#fb923c', side:'#ea580c' }
  };

  CUBE_SIZES.forEach(size=>{
    const s = styles[size];

    const div = document.createElement('div');
    div.className = 'cube-option'+(selectedCube===size?' selected':'');

    div.innerHTML = `
      <div class="cube-preview-wrap">
        <div class="cube3d" style="width:${s.size}px;height:${s.size}px;">
          <div class="face top" style="background:${s.top}"></div>
          <div class="face side" style="background:${s.side}"></div>
          <div class="face front" style="background:${s.front}"></div>
        </div>
      </div>
      <div><b>${size} cm cube</b></div>
      <div style="font-size:12px;color:#666;">Volume: ${size**3}</div>
    `;

    div.onclick = ()=>{
      selectedCube = size;
      renderCubeOptions();
    };

    cubeOptionsEl.appendChild(div);
  });
}

/* ===== 3D SCENE ===== */

const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45,1,0.1,1000);

camera.position.set(20,20,20);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff,1));

const group = new THREE.Group();
scene.add(group);

function rebuild(){
  while(group.children.length){
    group.remove(group.children[0]);
  }

  const geo = new THREE.BoxGeometry(10,10,10);
  const mat = new THREE.MeshBasicMaterial({color:0xcccccc, wireframe:true});
  const box = new THREE.Mesh(geo, mat);
  box.position.y=5;
  group.add(box);
}

function resize(){
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}

window.addEventListener('resize', resize);

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}

renderCubeOptions();
resize();
rebuild();
animate();

</script>

</body>
</html>
